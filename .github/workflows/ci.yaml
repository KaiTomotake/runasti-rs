name: Check
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      
      - name: Rustfmt
        run: cargo fmt --check --verbose

      - name: Clippy
        run: cargo clippy -- -D warnings
